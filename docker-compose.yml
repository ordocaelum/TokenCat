version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.local}
      POSTGRES_DB: tokencat_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokencat_dev"]
      interval: 3s
      timeout: 3s
      retries: 5
  tokencat:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      - SUPABASE_DB_DSN=postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.local}@postgres:5432/tokencat_dev
      # HF_HOME points OUTSIDE the bind mount so pre-baked weights survive at runtime.
      - HF_HOME=/opt/hf_cache
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
